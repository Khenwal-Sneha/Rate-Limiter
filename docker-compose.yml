version: "3.9"

services:

  backend:
    build: ./ratelimiter
    container_name: rate-limiter-backend
    ports:
      - "8080:8080"

  frontend:
    build: ./dashboard/frontend
    container_name: rate-limiter-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8080